<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>相続・事業承継 - 練習問題</title>
    <style>
        body { font-family: "Helvetica Neue", Arial, sans-serif; background-color: #f4f7f6; padding: 20px; color: #333; }
        .container { max-width: 650px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; margin-bottom: 10px; }
        h3 { color: #2c3e50; margin-top: 35px; border-left: 5px solid #3498db; padding-left: 10px; }
        .question { margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px solid #eee; }
        .question p { margin-bottom: 10px; font-weight: 500; }
        label { cursor: pointer; }
        button { background: #3498db; color: white; border: none; padding: 12px 25px; border-radius: 5px; cursor: pointer; display: block; margin: 30px auto; font-size: 1em; font-weight: bold; }
        button:hover { background: #2980b9; }
        .back-link { display: block; text-align: center; color: #7f8c8d; text-decoration: none; margin-top: 20px; font-weight: bold; }
        .back-link:hover { color: #34495e; }
    </style>
</head>
<body>

<div class="container">
    <h1>6. 相続・事業承継</h1>
    <p style="text-align: center; color: #666;">◯×問題と4択問題が混ざっています。全25問</p>
    
    <div id="quiz-content"></div>
    
    <button onclick="checkAnswers()">答え合わせをする</button>
    <a href="index.html" class="back-link">← ポータル（メニュー）に戻る</a>
</div>

<script>
const quizData = [
    // 1. 法定相続人と法定相続分
    { cat: "1. 法定相続人と法定相続分", q: "被相続人の配偶者は常に法定相続人となり、それ以外の遺族は「子→直系尊属（父母など）→兄弟姉妹」の順に、順位の高い人が配偶者と共に相続人となる。", a: "◯" },
    { cat: "1. 法定相続人と法定相続分", q: "被相続人の子が、相続の開始以前に死亡している場合、その子の子（被相続人の孫）が代わりに相続人となる仕組みを「代襲相続」という。", a: "◯" },
    { cat: "1. 法定相続人と法定相続分", q: "被相続人に配偶者と子2人がいる場合、配偶者と子2人のそれぞれの法定相続分（割合）の組み合わせとして正しいものはどれか？", options: ["配偶者 1/2、子1人につき 1/4", "配偶者 1/3、子1人につき 1/3", "配偶者 2/3、子1人につき 1/6", "配偶者 1/2、子1人につき 1/2"], a: "配偶者 1/2、子1人につき 1/4" },
    { cat: "1. 法定相続人と法定相続分", q: "被相続人に配偶者と兄弟姉妹が相続人となる場合、配偶者の法定相続分は「4分の3」、兄弟姉妹の法定相続分は（全員で）「4分の1」となる。", a: "◯" },
    { cat: "1. 法定相続人と法定相続分", q: "相続税の計算における「法定相続人の数」に含めることができる養子の数は、被相続人に実子がいる場合は何人までと制限されているか？", options: ["1人まで", "2人まで", "3人まで", "制限なし"], a: "1人まで" },

    // 2. 遺言と遺留分
    { cat: "2. 遺言と遺留分", q: "「自筆証書遺言」は、遺言者がその全文、日付、氏名を自署し、これに押印して作成するが、添付する財産目録についてはパソコン等で作成することが認められている。", a: "◯" },
    { cat: "2. 遺言と遺留分", q: "「公正証書遺言」は、公証人が遺言者から口頭でその内容を聴き取り、公証人が作成する遺言であるため、家庭裁判所による「検認」の手続きは不要である。", a: "◯" },
    { cat: "2. 遺言と遺留分", q: "法定相続人が被相続人の「兄弟姉妹」のみである場合、その兄弟姉妹には遺留分（最低限相続できる権利）は認められない。", a: "◯" },
    { cat: "2. 遺言と遺留分", q: "配偶者と子が法定相続人である場合、遺言によっても侵すことのできない「遺留分」の割合は、遺産全体に対して原則としていくらになるか？", options: ["3分の1", "2分の1", "4分の1", "遺留分はない"], a: "2分の1" },
    { cat: "2. 遺言と遺留分", q: "自筆証書遺言（法務局の遺言書保管制度を利用していないもの）を発見した者は、開封する前にどこの機関に提出して「検認」を受けなければならないか？", options: ["税務署", "法務局", "公証役場", "家庭裁判所"], a: "家庭裁判所" },

    // 3. 相続税の計算と控除
    { cat: "3. 相続税の計算と控除", q: "相続税の遺産に係る基礎控除額を求める計算式として、正しいものはどれか？", options: ["3,000万円 ＋（600万円 × 法定相続人の数）", "5,000万円 ＋（1,000万円 × 法定相続人の数）", "3,000万円 ＋（500万円 × 法定相続人の数）", "4,800万円 ＋（950万円 × 法定相続人の数）"], a: "3,000万円 ＋（600万円 × 法定相続人の数）" },
    { cat: "3. 相続税の計算と控除", q: "相続税の配偶者の税額軽減の特例により、配偶者が実際の相続や遺贈によって取得した財産額が、法定相続分またはいくらのいずれか多い金額までであれば、原則として配偶者に相続税はかからないか？", options: ["5,000万円", "1億円", "1億6,000万円", "2億円"], a: "1億6,000万円" },
    { cat: "3. 相続税の計算と控除", q: "相続税の申告書は、原則として、相続の開始があったことを知った日の翌日から何ヶ月以内に、被相続人の死亡時における住所地の所轄税務署長に提出しなければならないか？", options: ["3ヶ月以内", "4ヶ月以内", "6ヶ月以内", "10ヶ月以内"], a: "10ヶ月以内" },
    { cat: "3. 相続税の計算と控除", q: "被相続人の死亡によって遺族が受け取った「生命保険金（死亡保険金）」のうち、残された法定相続人の人数に応じて非課税となる限度額の計算式はどれか？", options: ["300万円 × 法定相続人の数", "500万円 × 法定相続人の数", "600万円 × 法定相続人の数", "1,000万円 × 法定相続人の数"], a: "500万円 × 法定相続人の数" },
    { cat: "3. 相続税の計算と控除", q: "被相続人の債務や葬式費用は、相続財産の価額から差し引く（債務控除する）ことができるが、香典返しの費用や墓地・墓碑の購入未払金は差し引くことができない。", a: "◯" },

    // 4. 贈与税の計算と特例
    { cat: "4. 贈与税の計算と特例", q: "贈与税の「暦年課税」において、受贈者（もらった人）1人につき年間（1月1日〜12月31日）いくらまでの基礎控除額が認められているか？", options: ["50万円", "110万円", "200万円", "2,500万円"], a: "110万円" },
    { cat: "4. 贈与税の計算と特例", q: "「相続時精算課税制度」を選択した場合、特定の贈与者からの贈与について累計いくらまで贈与税が非課税（特別控除）となるか？", options: ["1,000万円", "1,500万円", "2,000万円", "2,500万円"], a: "2,500万円" },
    { cat: "4. 贈与税の計算と特例", q: "婚姻期間が20年以上の夫婦間で、居住用不動産またはそれを取得するための資金の贈与が行われた場合、暦年課税の基礎控除とは別に、最高いくらまで控除できる特例（おしどり贈与）があるか？", options: ["1,000万円", "1,500万円", "2,000万円", "3,000万円"], a: "2,000万円" },
    { cat: "4. 贈与税の計算と特例", q: "「直系尊属から住宅取得等資金の贈与を受けた場合の非課税特例」において、受贈者（子や孫）は、贈与を受けた年の1月1日において原則として18歳以上でなければならない。", a: "◯" },
    { cat: "4. 贈与税の計算と特例", q: "贈与税の申告および納付の期間は、原則として、贈与を受けた年の「翌年の2月1日から3月15日まで」の間である。", a: "◯" },

    // 5. 財産評価と事業承継
    { cat: "5. 財産評価と事業承継", q: "市街地にある宅地の価額は、道路に付けられた1平方メートル当たりの価格を基準に計算する「路線価方式」によって評価される。", a: "◯" },
    { cat: "5. 不動産・自社株の評価と承継", q: "「小規模宅地等についての相続税の課税価格の計算の特例」において、特定居住用宅地地（マイホームの敷地）は、何平方メートルまで何％の減額を受けられるか？", options: ["200㎡まで 50％減額", "330㎡まで 80％減額", "400㎡まで 80％減額", "330㎡まで 50％減額"], a: "330㎡まで 80％減額" },
    { cat: "5. 財産評価と事業承継", q: "上場されていない株式（取引相場のない株式）の評価は、会社の規模や株主の状況に応じて、類似業種比準方式や純資産価額方式などによって評価される。", a: "◯" },
    { cat: "5. 財産評価と事業承継", q: "中小企業の事業承継を円滑にするため、後継者が非上場株式を相続・贈与により取得した場合に、一定の要件のもとで相続税・贈与税の納税が猶予・免除される制度を「事業承継税制」という。", a: "◯" },
    { cat: "5. 財産評価と事業承継", q: "遺産分割の手法のうち、特定の相続人が遺産を現物で取得し、その代わりに他の相続人に対して自己の財産（金銭など）を支払って調整する方法を何というか？", options: ["現物分割", "換価分割", "代償分割", "共有分割"], a: "代償分割" }
];

// クイズの出力処理
let html = "";
let currentCat = "";
quizData.forEach((item, idx) => {
    if (item.cat !== currentCat) {
        currentCat = item.cat;
        html += `<h3>${currentCat}</h3>`;
    }
    
    html += `<div class="question"><p><strong>問${idx+1}.</strong> ${item.q}</p>`;
    
    if (item.options) {
        // 4択問題
        item.options.forEach(opt => {
            html += `<label style="display:block; margin:6px 0;"><input type="radio" name="q${idx}" value="${opt}"> ${opt}</label>`;
        });
    } else {
        // ◯×問題
        html += `<label><input type="radio" name="q${idx}" value="◯"> ◯</label>
                 <label style="margin-left:30px;"><input type="radio" name="q${idx}" value="×"> ×</label>`;
    }
    
    html += `<div id="res${idx}" style="margin-top:8px; font-weight:bold;"></div></div>`;
});
document.getElementById('quiz-content').innerHTML = html;

// 答え合わせ処理
function checkAnswers() {
    let score = 0;
    quizData.forEach((item, idx) => {
        const selected = document.querySelector(`input[name="q${idx}"]:checked`);
        const resDiv = document.getElementById(`res${idx}`);
        
        if (selected && selected.value === item.a) {
            resDiv.innerHTML = "<span style='color:green;'>解：正解です！</span>";
            score++;
        } else {
            resDiv.innerHTML = `<span style='color:red;'>解：不正解（正解は「${item.a}」）</span>`;
        }
    });
    alert(`答え合わせが完了しました！\nあなたの正解数: ${score} / 25`);
}
</script>
</body>
</html>
