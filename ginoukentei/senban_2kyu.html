let currentUserId = "";
let currentYear = "";

function loginAndStart() {
    const idInput = document.getElementById("birth-id").value.trim();
    const yearSelect = document.getElementById("exam-year").value;

    if (idInput.length !== 8 || isNaN(idInput)) {
        alert("パスワード（誕生日）は西暦の8桁の数字で入力してください。 (例: 19790517)");
        return;
    }

    currentUserId = idInput;
    currentYear = yearSelect;

    const yearLabels = { "H29": "平成29年度", "H30": "平成30年度", "H31": "平成31年度" };
    document.getElementById("display-user").innerText = "ユーザーID: " + currentUserId;
    document.getElementById("display-year").innerText = "選択年度: " + yearLabels[currentYear];
    
    document.getElementById("auth-area").style.display = "none";
    document.getElementById("quiz-area").style.display = "block";

    renderQuestions();
}

function renderQuestions() {
    const data = examData[currentYear];
    const containerA = document.getElementById("group-a-questions");
    const containerB = document.getElementById("group-b-questions");
    
    containerA.innerHTML = "";
    containerB.innerHTML = "";

    const savedAnswers = JSON.parse(localStorage.getItem(`quiz_${currentUserId}_${currentYear}`)) || {};

    // A群の描画
    data.groupA.forEach(q => {
        const checkedO = savedAnswers[q.id] === "O" ? "checked" : "";
        const checkedX = savedAnswers[q.id] === "X" ? "checked" : "";

        containerA.innerHTML += `
            <div class="question-block" id="qblock-${q.id}">
                <div class="question-text">第 ${q.id} 題： ${q.text}</div>
                <div class="options">
                    <label><input type="radio" name="q-${q.id}" value="O" ${checkedO}> 〇（正しい）</label>
                    <label><input type="radio" name="q-${q.id}" value="X" ${checkedX}> ✕（誤り）</label>
                </div>
                <div class="feedback" id="feedback-${q.id}"></div>
            </div>
        `;
    });

    // B群の描画
    data.groupB.forEach(q => {
        const savedVal = savedAnswers[q.id] || "";
        let optionsHtml = "";
        
        q.options.forEach((opt, idx) => {
            const val = (idx + 1).toString();
            const checked = savedVal === val ? "checked" : "";
            optionsHtml += `<label><input type="radio" name="q-${q.id}" value="${val}" ${checked}> ${opt}</label>`;
        });

        containerB.innerHTML += `
            <div class="question-block" id="qblock-${q.id}">
                <div class="question-text">第 ${q.id} 題： ${q.text}</div>
                <div class="options">
                    ${optionsHtml}
                </div>
                <div class="feedback" id="feedback-${q.id}"></div>
            </div>
        `;
    });
}

function gradeQuiz() {
    const data = examData[currentYear];
    let score = 0;
    const total = data.groupA.length + data.groupB.length;
    const currentAnswers = {};

    // A群の採点
    data.groupA.forEach(q => {
        const selected = document.querySelector(`input[name="q-${q.id}"]:checked`);
        const userAns = selected ? selected.value : "";
        currentAnswers[q.id] = userAns;

        const feedbackEl = document.getElementById(`feedback-${q.id}`);
        if (userAns === q.ans) {
            score++;
            feedbackEl.innerHTML = `<span class="correct">◯ 正解 (正解: ${q.ans})</span>`;
        } else {
            feedbackEl.innerHTML = `<span class="incorrect">✕ 不正解 (正解: ${q.ans})</span>`;
        }
    });

    // B群の採点
    data.groupB.forEach(q => {
        const selected = document.querySelector(`input[name="q-${q.id}"]:checked`);
        const userAns = selected ? selected.value : "";
        currentAnswers[q.id] = userAns;

        const indexToSign = { "1": "イ", "2": "ロ", "3": "ハ", "4": "ニ" };
        const correctSign = indexToSign[q.ans];

        const feedbackEl = document.getElementById(`feedback-${q.id}`);
        if (userAns === q.ans) {
            score++;
            feedbackEl.innerHTML = `<span class="correct">◯ 正解 (正解: ${correctSign})</span>`;
        } else {
            feedbackEl.innerHTML = `<span class="incorrect">✕ 不正解 (正解: ${correctSign})</span>`;
        }
    });

    localStorage.setItem(`quiz_${currentUserId}_${currentYear}`, JSON.stringify(currentAnswers));
    localStorage.setItem(`score_${currentUserId}_${currentYear}`, score);

    const scoreText = document.getElementById("score-text");
    scoreText.innerText = `結果：${total}題中 ${score}題 正解！ (得点率: ${Math.round((score/total)*100)}%)`;
    document.getElementById("result-area").style.display = "block";

    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
}
