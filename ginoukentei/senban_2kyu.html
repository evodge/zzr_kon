        let currentYear = "";
        let currentAnswers = {};

        function login() {
            if (document.getElementById('birthdayInput').value.length === 8) {
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('mainScreen').classList.remove('hidden');
            } else {
                alert("8桁で入力してください");
            }
        }

        function startExam(year) {
            currentYear = year;
            document.getElementById('mainScreen').classList.add('hidden');
            document.getElementById('quizArea').classList.remove('hidden');
            renderQuestions(year);
        }

        function renderQuestions(year) {
            const data = examData[year];
            document.getElementById('qTitle').innerText = data.title;
            let html = "";
            data.questions.forEach((q, idx) => {
                html += `<div class="q-text">問${q.id}: ${q.text}</div>`;
                q.options.forEach(opt => {
                    html += `<button id="btn-${idx}-${opt}" class="option-btn" onclick="selectOption(${idx}, '${opt}')">${opt}</button>`;
                });
            });
            html += `<button class="submit" onclick="submitExam()">提出して採点</button>`;
            document.getElementById('qContent').innerHTML = html;
        }

        function selectOption(qIdx, option) {
            currentAnswers[qIdx] = option;
            examData[currentYear].questions[qIdx].options.forEach(opt => {
                const btn = document.getElementById(`btn-${qIdx}-${opt}`);
                btn.classList.toggle('selected', opt === option);
            });
        }

        function submitExam() {
            alert("採点機能は現在開発中です！");
        }
