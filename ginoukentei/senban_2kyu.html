<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>機械加工技能検定 練習システム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .header p {
            opacity: 0.9;
            font-size: 14px;
        }
        
        .content {
            padding: 30px;
        }
        
        .section {
            display: none;
        }
        
        .section.active {
            display: block;
        }
        
        /* ===== ログイン画面 ===== */
        .login-section {
            text-align: center;
        }
        
        .login-section h2 {
            margin-bottom: 30px;
            color: #333;
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 10px;
            font-weight: bold;
            color: #555;
        }
        
        .form-group input,
        .form-group select {
            width: 100%;
            max-width: 300px;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .info-box {
            background: #f0f4ff;
            border-left: 4px solid #667eea;
            padding: 15px;
            margin: 20px 0;
            border-radius: 5px;
            text-align: left;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }
        
        /* ===== 年度・問題選択画面 ===== */
        .select-section h2 {
            margin-bottom: 30px;
            color: #333;
        }
        
        .button-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .year-btn {
            padding: 20px;
            background: #f5f5f5;
            border: 2px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        .year-btn:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
            transform: translateY(-2px);
        }
        
        .year-btn.selected {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        
        /* ===== 問題表示画面 ===== */
        .quiz-section h2 {
            margin-bottom: 10px;
            color: #333;
        }
        
        .quiz-header {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .quiz-header span {
            font-weight: bold;
            color: #667eea;
        }
        
        .question-block {
            margin-bottom: 30px;
            padding: 20px;
            background: #fafafa;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }
        
        .question-number {
            font-weight: bold;
            color: #667eea;
            margin-bottom: 10px;
        }
        
        .question-text {
            margin-bottom: 15px;
            color: #333;
            line-height: 1.6;
        }
        
        .options {
            margin: 15px 0;
        }
        
        .option {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            padding: 10px;
            background: white;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .option:hover {
            background: #f0f4ff;
        }
        
        .option input[type="radio"] {
            margin-right: 12px;
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        
        .option label {
            margin: 0;
            cursor: pointer;
            flex: 1;
            font-weight: normal;
        }
        
        /* ===== ボタン類 ===== */
        .button-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 30px;
            flex-wrap: wrap;
        }
        
        button {
            padding: 12px 30px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
            border: 2px solid #ddd;
        }
        
        .btn-secondary:hover {
            background: #e0e0e0;
        }
        
        .btn-small {
            padding: 8px 15px;
            font-size: 14px;
        }
        
        /* ===== 結果画面 ===== */
        .result-section h2 {
            margin-bottom: 30px;
            color: #333;
            text-align: center;
        }
        
        .score-display {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .total-score {
            font-size: 48px;
            color: #667eea;
            font-weight: bold;
            margin: 20px 0;
        }
        
        .score-detail {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .score-card {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            border: 2px solid #ddd;
        }
        
        .score-card h3 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 14px;
        }
        
        .score-card .value {
            font-size: 32px;
            font-weight: bold;
            color: #333;
        }
        
        .pass-badge {
            display: inline-block;
            padding: 10px 30px;
            background: #4caf50;
            color: white;
            border-radius: 25px;
            font-weight: bold;
            margin: 20px 0;
            font-size: 18px;
        }
        
        .fail-badge {
            display: inline-block;
            padding: 10px 30px;
            background: #f44336;
            color: white;
            border-radius: 25px;
            font-weight: bold;
            margin: 20px 0;
            font-size: 18px;
        }
        
        .answer-review {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
        }
        
        .answer-review h3 {
            margin-bottom: 15px;
            color: #333;
        }
        
        .answer-item {
            background: white;
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 5px;
            border-left: 4px solid #667eea;
        }
        
        .answer-item.correct {
            border-left-color: #4caf50;
        }
        
        .answer-item.incorrect {
            border-left-color: #f44336;
        }
        
        /* ===== 履歴画面 ===== */
        .history-section h2 {
            margin-bottom: 20px;
            color: #333;
        }
        
        .history-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            border-radius: 8px;
            overflow: hidden;
        }
        
        .history-table thead {
            background: #667eea;
            color: white;
        }
        
        .history-table th,
        .history-table td {
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid #eee;
        }
        
        .history-table tbody tr:hover {
            background: #f9f9f9;
        }
        
        .history-table th {
            font-weight: bold;
        }
        
        .badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }
        
        .badge.pass {
            background: #c8e6c9;
            color: #2e7d32;
        }
        
        .badge.fail {
            background: #ffcdd2;
            color: #c62828;
        }
        
        .no-data {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        
        /* ===== ユーティリティ ===== */
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 20px;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s;
        }
        
        .user-info {
            background: #f0f4ff;
            padding: 12px 20px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .user-info span {
            color: #667eea;
            font-weight: bold;
        }
        
        @media (max-width: 768px) {
            .button-grid {
                grid-template-columns: 1fr;
            }
            
            .header h1 {
                font-size: 20px;
            }
            
            .history-table th,
            .history-table td {
                padding: 10px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⚙️ 機械加工技能検定</h1>
            <p>2級 機械加工 学科試験問題 練習システム</p>
        </div>
        
        <div class="content">
            <!-- ===== ログイン画面 ===== -->
            <div class="section active login-section">
                <h2>受験者情報入力</h2>
                <form onsubmit="login(event)">
                    <div class="form-group">
                        <label for="birthday">🎂 誕生日（西暦8桁）</label>
                        <input type="text" id="birthday" placeholder="例：19790829" maxlength="8" pattern="\d{8}" required>
                        <div class="info-box">
                            <strong>入力例：</strong><br>
                            1979年8月29日の場合 → 19790829
                        </div>
                    </div>
                    <button type="submit" class="btn-primary">ログイン</button>
                </form>
            </div>
            
            <!-- ===== 年度・問題選択画面 ===== -->
            <div class="section select-section">
                <div class="user-info">
                    <span id="userDisplay"></span>
                    <button class="btn-secondary btn-small" onclick="logout()">ログアウト</button>
                </div>
                
                <h2>実施年度を選択</h2>
                <div class="button-grid">
                    <button class="year-btn" onclick="selectYear(2022)">令和4年度<br>(2022年)</button>
                    <button class="year-btn" onclick="selectYear(2023)">令和5年度<br>(2023年)</button>
                    <button class="year-btn" onclick="selectYear(2024)">令和6年度<br>(2024年)</button>
                    <button class="year-btn" onclick="selectYear(2025)">令和7年度<br>(2025年)</button>
                </div>
                
                <h2 style="margin-top: 40px;">過去の成績を確認</h2>
                <button class="btn-primary" onclick="showHistory()">📊 成績履歴一覧</button>
            </div>
            
            <!-- ===== 問題表示画面 ===== -->
            <div class="section quiz-section">
                <div class="user-info">
                    <span id="quizUserDisplay"></span>
                    <button class="btn-secondary btn-small" onclick="backToSelect()">年度選択に戻る</button>
                </div>
                
                <h2>令和<span id="quizYearDisplay"></span>年度 試験問題</h2>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressBar" style="width: 0%"></div>
                </div>
                <div class="quiz-header">
                    <span>問題 <span id="currentQuestion">1</span> / <span id="totalQuestion">50</span></span>
                    <span id="timer" style="color: #f44336; font-size: 18px;"></span>
                </div>
                
                <div id="quizContainer"></div>
                
                <div class="button-group">
                    <button class="btn-secondary" onclick="previousQuestion()" id="prevBtn">← 前へ</button>
                    <button class="btn-secondary" onclick="nextQuestion()" id="nextBtn">次へ →</button>
                    <button class="btn-primary" onclick="submitQuiz()">採点する</button>
                </div>
            </div>
            
            <!-- ===== 結果画面 ===== -->
            <div class="section result-section">
                <h2>試験結果</h2>
                
                <div class="score-display">
                    <div id="passMessage"></div>
                    <div class="total-score" id="totalScoreDisplay">0/100</div>
                    
                    <div class="score-detail">
                        <div class="score-card">
                            <h3>A問題（真偽法）</h3>
                            <div class="value" id="scoreA">0</div>
                            <small>/50点</small>
                        </div>
                        <div class="score-card">
                            <h3>B問題（多肢選一法）</h3>
                            <div class="value" id="scoreB">0</div>
                            <small>/50点</small>
                        </div>
                    </div>
                </div>
                
                <div class="answer-review">
                    <h3>📋 解答確認</h3>
                    <div id="reviewContainer"></div>
                </div>
                
                <div class="button-group">
                    <button class="btn-primary" onclick="retakeQuiz()">🔄 もう一度チャレンジ</button>
                    <button class="btn-secondary" onclick="backToSelect()">📚 年度選択に戻る</button>
                </div>
            </div>
            
            <!-- ===== 履歴画面 ===== -->
            <div class="section history-section">
                <button class="btn-secondary" onclick="backToSelect()">← 戻る</button>
                <h2 style="margin-top: 20px;">📊 成績履歴</h2>
                <div id="historyContainer"></div>
            </div>
        </div>
    </div>

    <script>
        // ===== グローバル変数 =====
        let currentUser = null;
        let currentYear = null;
        let currentQuestion = 0;
        let answers = {};
        let quizData = null;
        let startTime = null;
        let timeLimit = 40 * 60; // 40分

        // ===== 問題データ（正答含む） =====
        const questionsData = {

                        { num: 7, text: '日本産業規格(JIS)によれば、刃先交換チップの形状は、正三角形、正方形及び正六角形の3種類である。' },

        // ===== ログイン処理 =====
        function login(e) {
            e.preventDefault();
            const birthday = document.getElementById('birthday').value;
            
            if (birthday.length !== 8 || isNaN(birthday)) {
                alert('正しい誕生日（8桁）を入力してください');
                return;
            }
            
            currentUser = birthday;
            updateUserDisplay();
            showSection('select-section');
        }

        function logout() {
            currentUser = null;
            currentYear = null;
            answers = {};
            showSection('login-section');
        }

        // ===== 年度選択 =====
        function selectYear(year) {
            currentYear = year;
            answers = {};
            quizData = questionsData[year];
            
            // ボタンのハイライト更新
            document.querySelectorAll('.year-btn').forEach(btn => btn.classList.remove('selected'));
            event.target.classList.add('selected');
            
            // 問題読み込み
            loadQuiz();
        }

        // ===== 問題読み込みと表示 =====
        function loadQuiz() {
            currentQuestion = 0;
            showQuestion();
            showSection('quiz-section');
            startTime = Date.now();
            startTimer();
        }

        function showQuestion() {
            const totalQuestions = 50;
            const progressPercent = ((currentQuestion + 1) / totalQuestions) * 100;
            document.getElementById('progressBar').style.width = progressPercent + '%';
            document.getElementById('currentQuestion').textContent = currentQuestion + 1;
            document.getElementById('totalQuestion').textContent = totalQuestions;
            
            const isGroupA = currentQuestion < 25;
            const questionIndex = currentQuestion % 25;
            const groupKey = isGroupA ? 'A' : 'B';
            const question = quizData.questions[groupKey][questionIndex];
            const groupLabel = isGroupA ? 'A問題（真偽法）' : 'B問題（多肢選一法）';
            
            let htmlContent = `
                <div class="question-block">
                    <div class="question-number">${groupLabel} - 第${question.num}問</div>
                    <div class="question-text">${question.text}</div>
                    <div class="options">
            `;
            
            let answerKey;
            if (isGroupA) {
                // 真偽法
                answerKey = ['×', '○'];
                const selected = answers[currentQuestion] || '';
                answerKey.forEach((option, idx) => {
                    const id = `option-${currentQuestion}-${idx}`;
                    const checked = selected === option ? 'checked' : '';
                    htmlContent += `
                        <label class="option">
                            <input type="radio" name="question-${currentQuestion}" value="${option}" id="${id}" 
                                   ${checked} onchange="saveAnswer(${currentQuestion}, '${option}')">
                            <label for="${id}" style="margin: 0;">${option}</label>
                        </label>
                    `;
                });
            } else {
                // 多肢選一法
                answerKey = ['イ', 'ロ', 'ハ', 'ニ'];
                const selected = answers[currentQuestion] || '';
                answerKey.forEach((option, idx) => {
                    const id = `option-${currentQuestion}-${idx}`;
                    const checked = selected === option ? 'checked' : '';
                    htmlContent += `
                        <label class="option">
                            <input type="radio" name="question-${currentQuestion}" value="${option}" id="${id}" 
                                   ${checked} onchange="saveAnswer(${currentQuestion}, '${option}')">
                            <label for="${id}" style="margin: 0;">${option}</label>
                        </label>
                    `;
                });
            }
            
            htmlContent += '</div></div>';
            document.getElementById('quizContainer').innerHTML = htmlContent;
            
            // ボタンの有効/無効
            document.getElementById('prevBtn').disabled = currentQuestion === 0;
            document.getElementById('nextBtn').disabled = currentQuestion === 49;
            
            updateUserDisplay('quizUserDisplay');
            document.getElementById('quizYearDisplay').textContent = quizData.yearNum;
        }

        function nextQuestion() {
            if (currentQuestion < 49) {
                currentQuestion++;
                showQuestion();
            }
        }

        function previousQuestion() {
            if (currentQuestion > 0) {
                currentQuestion--;
                showQuestion();
            }
        }

        function saveAnswer(questionNum, answer) {
            answers[questionNum] = answer;
        }

        // ===== 採点 =====
        function submitQuiz() {
            let scoreA = 0;
            let scoreB = 0;
            
            // A問題（0-24）
            for (let i = 0; i < 25; i++) {
                if (answers[i] === quizData.answerKey.A[i]) {
                    scoreA += 2;
                }
            }
            
            // B問題（25-49）
            for (let i = 25; i < 50; i++) {
                if (answers[i] === quizData.answerKey.B[i - 25]) {
                    scoreB += 2;
                }
            }
            
            const totalScore = scoreA + scoreB;
            const passed = totalScore >= 60;
            
            // 履歴に保存
            saveToHistory(scoreA, scoreB, totalScore, passed);
            
            // 結果表示
            showResult(scoreA, scoreB, totalScore, passed);
        }

        function showResult(scoreA, scoreB, totalScore, passed) {
            const passMessage = passed ? 
                '<div class="pass-badge">✓ 合格</div>' : 
                '<div class="fail-badge">✗ 不合格</div>';
            
            document.getElementById('passMessage').innerHTML = passMessage;
            document.getElementById('totalScoreDisplay').textContent = totalScore + '/100';
            document.getElementById('scoreA').textContent = scoreA;
            document.getElementById('scoreB').textContent = scoreB;
            
            // 解答確認
            let reviewHTML = '';
            for (let i = 0; i < 50; i++) {
                const isGroupA = i < 25;
                const correctAnswer = isGroupA ? 
                    quizData.answerKey.A[i] : 
                    quizData.answerKey.B[i - 25];
                const userAnswer = answers[i] || '未解答';
                const isCorrect = userAnswer === correctAnswer;
                const statusClass = isCorrect ? 'correct' : 'incorrect';
                const statusIcon = isCorrect ? '✓' : '✗';
                const groupLabel = isGroupA ? 'A' : 'B';
                
                reviewHTML += `
                    <div class="answer-item ${statusClass}">
                        <strong>${groupLabel}問題${isGroupA ? i + 1 : i - 24}:</strong> 
                        あなたの答え: <strong>${userAnswer}</strong> 
                        → 正答: <strong>${correctAnswer}</strong> 
                        <strong style="float: right;">${statusIcon}</strong>
                    </div>
                `;
            }
            
            document.getElementById('reviewContainer').innerHTML = reviewHTML;
            showSection('result-section');
        }

        // ===== 履歴管理 =====
        function saveToHistory(scoreA, scoreB, totalScore, passed) {
            let history = JSON.parse(localStorage.getItem(`history_${currentUser}`) || '[]');
            
            history.push({
                date: new Date().toLocaleString('ja-JP'),
                year: currentYear,
                yearDisplay: quizData.year,
                scoreA: scoreA,
                scoreB: scoreB,
                totalScore: totalScore,
                passed: passed
            });
            
            localStorage.setItem(`history_${currentUser}`, JSON.stringify(history));
        }

        function showHistory() {
            const history = JSON.parse(localStorage.getItem(`history_${currentUser}`) || '[]');
            let html = '';
            
            if (history.length === 0) {
                html = '<div class="no-data">📝 まだ解いた問題がありません</div>';
            } else {
                html = `
                    <table class="history-table">
                        <thead>
                            <tr>
                                <th>実施日時</th>
                                <th>年度</th>
                                <th>A問題</th>
                                <th>B問題</th>
                                <th>合計</th>
                                <th>合否</th>
                            </tr>
                        </thead>
                        <tbody>
                `;
                
                history.forEach(record => {
                    const badgeClass = record.passed ? 'pass' : 'fail';
                    const badgeText = record.passed ? '合格' : '不合格';
                    html += `
                        <tr>
                            <td>${record.date}</td>
                            <td>${record.yearDisplay}</td>
                            <td>${record.scoreA}点</td>
                            <td>${record.scoreB}点</td>
                            <td><strong>${record.totalScore}点</strong></td>
                            <td><span class="badge ${badgeClass}">${badgeText}</span></td>
                        </tr>
                    `;
                });
                
                html += '</tbody></table>';
            }
            
            document.getElementById('historyContainer').innerHTML = html;
            showSection('history-section');
        }

        // ===== UI操作 =====
        function showSection(sectionName) {
            document.querySelectorAll('.section').forEach(section => {
                section.classList.remove('active');
            });
            document.querySelector('.' + sectionName).classList.add('active');
        }

        function retakeQuiz() {
            selectYear(currentYear);
        }

        function backToSelect() {
            showSection('select-section');
            updateUserDisplay();
        }

        function updateUserDisplay(elementId = 'userDisplay') {
            if (currentUser) {
                const year = currentUser.substring(0, 4);
                const month = currentUser.substring(4, 6);
                const day = currentUser.substring(6, 8);
                const displayText = `👤 ${year}年${month}月${day}日生まれ`;
                const element = document.getElementById(elementId);
                if (element) {
                    element.textContent = displayText;
                }
            }
        }

        // ===== タイマー =====
        function startTimer() {
            const timerElement = document.getElementById('timer');
            const updateTimer = () => {
                const elapsed = Math.floor((Date.now() - startTime) / 1000);
                const remaining = timeLimit - elapsed;
                
                if (remaining <= 0) {
                    timerElement.textContent = '時間です！';
                    timerElement.style.color = '#f44336';
                    return;
                }
                
                const minutes = Math.floor(remaining / 60);
                const seconds = remaining % 60;
                timerElement.textContent = `⏱ ${minutes}:${seconds.toString().padStart(2, '0')}`;
                
                if (remaining < 300) {
                    timerElement.style.color = '#ff9800';
                } else if (remaining < 600) {
                    timerElement.style.color = '#f44336';
                }
                
                setTimeout(updateTimer, 1000);
            };
            updateTimer();
        }
