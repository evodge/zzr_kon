<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自宅環境・RasPiリモートモニター</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0a0f1e; --panel: #0f1729; --border: #1e3a5f;
            --cpu-color: #00ff9d; --f2-color: #ff6b35; --f1-color: #00d4ff;
            --text: #c8e0f4; --text-dim: #4a7fa5;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        
        header { 
            margin-bottom: 20px; 
            padding-bottom: 12px; 
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            flex-wrap: wrap;
            gap: 10px;
        }
        h1 { font-size: 1.4rem; color: #00d4ff; letter-spacing: 1px; }
        .update-time { font-size: 0.8rem; color: var(--text-dim); }
        
        /* 画面切り替えタブ */
        .tabs { display: flex; gap: 8px; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .tab-btn {
            background: #132238; color: var(--text-dim); border: 1px solid var(--border);
            padding: 8px 16px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 0.9rem;
            transition: all 0.2s ease;
        }
        .tab-btn:hover { background: #1a3152; color: var(--text); }
        .tab-btn.active { background: #00d4ff; color: #0a0f1e; border-color: #00d4ff; }
        
        /* コンテンツエリアの表示制御 */
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* 最新値表示カード */
        .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .card { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
        .card-title { font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase; margin-bottom: 8px; }
        .card-value { font-size: 1.8rem; font-weight: bold; }
        .unit { font-size: 0.9rem; color: var(--text-dim); margin-left: 2px; }
        .diff-val { font-size: 1.1rem; color: #ffcc00; margin-top: 4px; }
        
        /* グラフ・ログパネル */
        .chart-panel { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-bottom: 24px; }
        .chart-title { font-size: 0.8rem; color: var(--text-dim); margin-bottom: 12px; }
        
        .error-msg { color: #ff3366; text-align: center; padding: 20px; display: none; background: rgba(255,51,102,0.1); border: 1px solid #ff3366; border-radius: 8px; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <h1>HOME CLIMATE & SERVER MONITOR</h1>
        </div>
        <div class="update-time" id="last-update">データ同期中...</div>
    </header>

    <div id="error-area" class="error-msg">data.json の読み込みに失敗しました
