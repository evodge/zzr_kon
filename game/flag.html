<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>超脳トレ！ハイスピード旗揚げ</title>
    <style>
        body {
            margin: 0; padding: 10px; background: #121214;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            color: white; text-align: center;
            box-sizing: border-box; min-height: 100vh;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            overflow: hidden;
        }
        .game-container {
            width: 100%; max-width: 400px;
            background: #1c1c1e; padding: 20px; border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            box-sizing: border-box;
            position: relative;
        }
        h1 { font-size: 22px; margin: 0 0 5px 0; color: #ffd60a; }
        .score-board {
            display: flex; justify-content: space-between;
            font-size: 16px; color: #aeaeb2; margin-bottom: 10px;
            font-weight: bold;
        }
        .score-val { color: #30d158; font-size: 20px; }

        /* タイムゲージ */
        .progress-bar-container {
            width: 100%; height: 8px; background: #3a3a3c;
            border-radius: 4px; margin-bottom: 15px; overflow: hidden;
        }
        .progress-bar {
            width: 100%; height: 100%; background: #00ffcc;
            transition: width 0.1s linear;
        }

        /* 指示表示エリア */
        .command-box {
            background: #000; border: 2px solid #3a3a3c;
            padding: 20px 10px; margin-bottom: 20px; border-radius: 10px;
            min-height: 70px; display: flex; justify-content: center; align-items: center;
            font-size: 24px; font-weight: bold; line-height: 1.4;
        }

        /* キャラクターと旗 */
        .stage-area {
            height: 120px; display: flex; justify-content: center; align-items: flex-end;
            margin-bottom: 25px;
        }
        .character {
            width: 50px; height: 70px; background: #2c2c2e;
            border-radius: 8px 8px 0 0; position: relative; border: 2px solid #444;
        }
        .char-head {
            width: 32px; height: 32px; background: #ffdbac; border-radius: 50%;
            position: absolute; top: -28px; left: 9px;
        }
        .char-eye {
            width: 4px; height: 4px; background: #222; border-radius: 50%;
            position: absolute; top: 12px; left: 8px;
        }
        .char-eye.right { left: 20px; }

        .arm-container {
            position: absolute; top: 12px; width: 16px; height: 50px;
            transition: transform 0.1s ease-out;
        }
        .left-side { left: -12px; transform-origin: top right; }  
        .right-side { right: -12px; transform-origin: top left; } 
        .arm { width: 6px; height: 30px; background: #ffdbac; border-radius: 3px; margin: 0 auto; }
        .flag {
            width: 24px; height: 16px; position: absolute; top: 25px;
            border: 1px solid #333;
        }
        .red-flag { background: #ff453a; left: -18px; }
        .white-flag { background: #ffffff; right: -18px; }

        /* 入力ボタン */
        .input-panel {
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%;
        }
        .action-btn {
            padding: 20px 10px; font-size: 22px; font-weight: bold; border: none;
            border-radius: 12px; cursor: pointer; box-shadow: 0 6px 12px rgba(0,0,0,0.4);
            transition: transform 0.05s, opacity 0.2s;
        }
        .action-btn:active { transform: scale(0.92); }
        .btn-red { background: #ff453a; color: white; }
        .btn-white { background: #ffffff; color: #111; }

        /* スタート・オーバーレイ */
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(28,28,30,0.95); border-radius: 16px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 10; padding: 20px; box-sizing: border-box;
        }
        .start-btn {
            background: #ffd60a; color: #111; border: none; padding: 15px 40px;
            font-size: 20px; font-weight: bold; border-radius: 30px; cursor: pointer;
            box-shadow: 0 4px 15px rgba(255,214,10,0.4);
        }
    </style>
</head>
<body>

<div class="game-container">
    <div class="overlay" id="overlay">
        <h2 id="overlay-title">🧠 限界突破！旗揚げ</h2>
        <p id="overlay-desc" style="color:#aeaeb2; font-size:14px; margin-bottom:25px; line-height:1.5;">
            指示に従って素早くボタンを押せ！<br>
            正解するほどスピードがアップするぞ。<br>
            音量をオンにして挑戦しよう！
        </p>
        <button class="start-btn" onclick="startGame()" id="start-btn">ゲーム開始</button>
    </div>

    <h1>⚡ HASTE FLAG</h1>
    <div class="score-board">
        <div>SCORE: <span class="score-val" id="score-text">0</span></div>
        <div>SPEED: <span style="color:#ffd60a;" id="speed-text">Lv.1</span></div>
    </div>

    <div class="progress-bar-container">
        <div class="progress-bar" id="timer-gauge"></div>
    </div>
    
    <div class="command-box" id="command-text">
        音声をONにして<br>スタートしてね！
    </div>

    <div class="stage-area">
        <div class="character">
            <div class="char-head">
                <div class="char-eye"></div>
                <div class="char-eye right"></div>
            </div>
            <div class="arm-container left-side" id="red-arm">
                <div class="arm"></div>
                <div class="flag red-flag"></div>
            </div>
            <div class="arm-container right-side" id="white-arm">
                <div class="arm"></div>
                <div class="flag white-flag"></div>
            </div>
        </div>
    </div>

    <div class="input-panel">
        <button class="action-btn btn-red" onclick="pressButton('red')">赤</button>
        <button class="action-btn btn-white" onclick="pressButton('white')">白</button>
    </div>
</div>

<script>
    // ゲーム状態変数
    let score = 0;
    let isPlaying = false;
    let currentTarget = null; // 'red' か 'white'
    let timeLimit = 3500;     // 初期制限時間(ms)
    let timeLeft = 3500;
    let timerInterval = null;
    let lastTickTime = 0;

    // オーディオコンテキスト（自作BGM・効果音用）
    let audioCtx = null;
    let bgmInterval = null;
    let beatCount = 0;
    let currentBPM = 125;

    // 演出用カラー設定
    const COLOR_CODE = { '赤': '#ff453a', '白': '#ffffff' };

    // --- ゲームループ & 出題システム ---

    function startGame() {
        // オーディオの初期化（ブラウザ制限解除のためクリック内で行う）
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        
        score = 0;
        timeLimit = 3500; 
        currentBPM = 125;
        isPlaying = true;
        
        document.getElementById('score-text').innerText = score;
        document.getElementById('speed-text').innerText = "Lv.1";
        document.getElementById('overlay').style.display = "none";
        
        resetFlags();
        startBGM();
        nextQuestion();
    }

    function nextQuestion() {
        if (!isPlaying) return;

        // 難易度（スコア）に応じて制限時間を少しずつ短縮（最低1.0秒）
        timeLimit = Math.max(1000, 3500 - (score * 120));
        // スコアに応じてBGMのテンポを上げる（最大BPM 180）
        currentBPM = Math.min(180, 125 + (score * 2));
        updateBGMInterval();

        document.getElementById('speed-text').innerText = `Lv.${Math.floor(score/3) + 1}`;

        // ランダム出題ロジック
        const questionTypes = [
            'normal',    // 素直な問題
            'stroop',    // 文字と色が逆
            'negative'   // 「〜あげないで、〜さげる」系
        ];
        // スコアが低いうちは素直な問題多め
        const type = score < 3 ? 'normal' : questionTypes[Math.floor(Math.random() * questionTypes.length)];

        let displayWord = "";
        let displayColor = "";
        
        if (type === 'normal') {
            currentTarget = Math.random() < 0.5 ? 'red' : 'white';
            displayWord = currentTarget === 'red' ? "赤 あげて！" : "白 あげて！";
            displayColor = currentTarget === 'red' ? '赤' : '白';
        } 
        else if (type === 'stroop') {
            // 文字と色をあえてバラバラにする（正解は「文字の指示」に従う）
            currentTarget = Math.random() < 0.5 ? 'red' : 'white';
            displayWord = currentTarget === 'red' ? "赤 あげて！" : "白 あげて！";
            // 視覚的な罠として逆の色を塗る
            displayColor = currentTarget === 'red' ? '白' : '赤';
        } 
        else if (type === 'negative') {
            // 例：「白あげないで赤さげる」＝ 正解は【白】（赤は下げるので何もしない、または白を動かす）
            // ここではシンプルに最終的に「今上げるべき方」を1択で指示します
            if (Math.random() < 0.5) {
                displayWord = "白あげないで<br><span style='font-size:20px;'>赤あげる！</span>";
                currentTarget = 'red';
                displayColor = Math.random() < 0.5 ? '赤' : '白';
            } else {
                displayWord = "赤あげないで<br><span style='font-size:20px;'>白あげる！</span>";
                currentTarget = 'white';
                displayColor = Math.random() < 0.5 ? '白' : '赤';
            }
        }

        // 画面に反映
        const textEl = document.getElementById('command-text');
        textEl.innerHTML = displayWord;
        textEl.style.color = COLOR_CODE[displayColor] || '#fff';

        // タイマー開始
        timeLeft = timeLimit;
        lastTickTime = performance.now();
        
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(updateTimer, 33);
    }

    function updateTimer() {
        const now = performance.now();
        const delta = now - lastTickTime;
        lastTickTime = now;

        timeLeft -= delta;
        
        // ゲージの長さを更新
        const percentage = Math.max(0, (timeLeft / timeLimit) * 100);
        document.getElementById('timer-gauge').style.width = percentage + "%";

        if (timeLeft <= 0) {
            gameOver("タイムアップ！時間切れだ…");
        }
    }

    function pressButton(color) {
        if (!isPlaying) return;

        // 1秒未満で即答、または時間内に正しいボタンを押せたか
        if (color === currentTarget) {
            score++;
            document.getElementById('score-text').innerText = score;
            playSE(880, 0.1); // ピッ（正解音）
            
            // 旗のアニメーションをチラつかせる
            animateFlag(color);
            
            // 次の問題へ
            nextQuestion();
        } else {
            gameOver("そっちじゃない！引っかかったな？");
        }
    }

    function gameOver(message) {
        isPlaying = false;
        clearInterval(timerInterval);
        stopBGM();
        playSE(220, 0.4); // ブー（不正解音）

        document.getElementById('overlay-title').innerText = "❌ GAME OVER";
        document.getElementById('overlay-desc').innerHTML = `${message}<br><br><span style='font-size:24px; color:#30d158;'>SCORE: ${score}</span>`;
        document.getElementById('start-btn').innerText = "もう一度挑戦";
        document.getElementById('overlay').style.display = "flex";
    }

    // --- ビジュアル演出（キャラの旗の動き） ---
    function animateFlag(color) {
        resetFlags();
        const arm = document.getElementById(`${color}-arm`);
        const deg = color === 'red' ? "-140deg" : "140deg";
        arm.style.transform = `rotate(${deg})`;
        
        // 0.2秒後に自動で下ろす
        setTimeout(() => {
            if(isPlaying) resetFlags();
        }, 200);
    }

    function resetFlags() {
        document.getElementById('red-arm').style.transform = "rotate(0deg)";
        document.getElementById('white-arm').style.transform = "rotate(0deg)";
    }


    // --- Web Audio API によるシンセBGMシステム ---
    // 外部ファイル不要で、スクリプトから直接リズム（ドラムとベース）を鳴らします。

    function playSE(freq, duration) {
        if (!audioCtx) return;
        let osc = audioCtx.createOscillator();
        let gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    }

    function playDrumBeat(type) {
        if (!audioCtx) return;
        // 簡易的なホワイトノイズ（スネア用）やサイン波（バスドラ用）でリズムを刻む
        let osc = audioCtx.createOscillator();
        let gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);

        if (type === 'kick') {
            // 重低音バスドラム
            osc.frequency.setValueAtTime(120, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.12);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.12);
        } else if (type === 'hat') {
            // 高音ハイハット
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(8000, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.05);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.05);
        }
    }

    function startBGM() {
        beatCount = 0;
        updateBGMInterval();
    }

    function updateBGMInterval() {
        if (!isPlaying) return;
        if (bgmInterval) clearInterval(bgmInterval);

        // BPM（1分間の拍数）から4分音符の間隔（ミリ秒）を計算
        const intervalMs = (60 / currentBPM) * 1000 / 2; // 8ビート単位で刻む

        bgmInterval = setInterval(() => {
            if (!isPlaying) return;
            
            // 4拍子のリズムパターンを作る
            const step = beatCount % 8;
            if (step === 0 || step === 4) {
                playDrumBeat('kick'); // ドン、ドン
            } else if (step === 2 || step === 6) {
                playDrumBeat('hat');  // チッ、チッ
            } else {
                if (Math.random() < 0.3) playDrumBeat('hat'); // ランダムな裏拍
            }
            beatCount++;
        }, intervalMs);
    }

    function stopBGM() {
        if (bgmInterval) clearInterval(bgmInterval);
    }
</script>

</body>
</html>
