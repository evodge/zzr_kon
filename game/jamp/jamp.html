<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>タイムアタック・ジャンパー</title>
    <style>
        body {
            margin: 0; padding: 0; background: #222;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            overflow: hidden; text-align: center; color: white;
            user-select: none; -webkit-user-select: none;
        }
        #game-container {
            position: relative; width: 100vw; height: 100vh; max-width: 480px;
            margin: 0 auto; background: #333; overflow: hidden;
        }
        canvas { display: block; background: #111; width: 100%; height: 100%; }
        .ui-element {
            position: absolute; font-weight: bold; text-shadow: 2px 2px 0 #000;
        }
        #score-ui { top: 140px; left: 20px; font-size: 24px; color: #ffcc00; }
        #timer-ui { top: 140px; right: 20px; font-size: 24px; color: #ff5353; }
        
        /* 画面オーバーレイ */
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 10;
        }
        input {
            padding: 12px; font-size: 18px; border-radius: 5px; border: none;
            width: 70%; max-width: 280px; text-align: center; margin-bottom: 15px;
        }
        button {
            padding: 12px 30px; font-size: 18px; font-weight: bold;
            background: #ffcc00; border: none; border-radius: 5px; cursor: pointer;
        }
        button:active { background: #cca300; }
        .hidden { display: none !important; }
        
        /* ランキング表示用 */
        #ranking-list {
            width: 80%; max-height: 200px; overflow-y: auto;
            margin: 15px 0; padding: 0; list-style: none; text-align: left;
        }
        #ranking-list li {
            padding: 6px 10px; border-bottom: 1px solid #444;
            display: flex; justify-content: space-between; font-size: 16px;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="score-ui" class="ui-element">高度: 0m</div>
    <div id="timer-ui" class="ui-element">残り: 60s</div>
    <canvas id="gameCanvas"></canvas>

    <div id="start-screen" class="overlay">
        <h2>タイムアタック・ジャンパー</h2>
        <p>1分間でどこまで高く登れるか！？</p>
        <input type="text" id="username" placeholder="名前を入力してください" maxlength="10">
        <button onclick="startGame()">ゲームスタート</button>
    </div>

    <div id="result-screen" class="overlay hidden">
        <h2 style="color: #ff5353;">タイムアップ！</h2>
        <p id="final-score" style="font-size: 24px; color: #ffcc00;"></p>
        <h3>🏆 世界ランキング (TOP 3)</h3>
        <ul id="ranking-list">
            <li>読み込み中...</li>
        </ul>
        <button onclick="restartGame()">もう一度挑戦</button>
    </div>
</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

const V_WIDTH = 480;
const V_HEIGHT = 800;
canvas.width = V_WIDTH;
canvas.height = V_HEIGHT;

let gameInterval, timerInterval;
let gameState = "START";

let player, platforms, cameraY, score, timeLeft;
const GRAVITY = 0.4;

class Player {
    constructor() {
        this.x = V_WIDTH / 2;
        this.y = V_HEIGHT - 150;
        this.vx = 0;
        this.vy = 0;
        this.radius = 18;
        this.isGrounded = true;
    }
    update() {
        this.vy += GRAVITY;
        this.y += this.vy;
        this.x += this.vx;

        if (this.x < this.radius) {
            this.x = this.radius;
            this.vx = -this.vx * 0.5;
        }
        if (this.x > V_WIDTH - this.radius) {
            this.x = V_WIDTH - this.radius;
            this.vx = -this.vx * 0.5;
        }
    }
    jump(dx) {
        if (this.isGrounded) {
            this.vy = -13;
            const baseVx = dx * 0.035;
            const sign = Math.sign(dx) || 1;
            const absVx = Math.abs(baseVx);
            const clampedVx = Math.max(1.5, Math.min(8.5, absVx));
            
            this.vx = clampedVx * sign;
            this.isGrounded = false;
        }
    }
    draw() {
        ctx.fillStyle = "#00ffcc";
        ctx.beginPath();
        ctx.arc(this.x, this.y - cameraY, this.radius, 0, Math.PI * 2);
        ctx.fill();
    }
}

function generatePlatforms(startY, count) {
    let arr = [];
    for(let i=0; i<count; i++) {
        arr.push({
            x: Math.random() * (V_WIDTH - 80),
            y: startY - (i * 60) - Math.random() * 20,
            w: 80,
            h: 15
        });
    }
    return arr;
}

function startGame() {
    const name = document.getElementById("username").value.trim();
    if (!name) { alert("名前を入力してください！"); return; }
    
    document.getElementById("start-screen").classList.add("hidden");
    document.getElementById("result-screen").classList.add("hidden");
    
    player = new Player();
    cameraY = 0;
    score = 0;
    timeLeft = 60;
    platforms = [{ x: 0, y: V_HEIGHT - 50, w: V_WIDTH, h: 50, isGround: true }];
    platforms = platforms.concat(generatePlatforms(V_HEIGHT - 120, 20));
    
    gameState = "PLAY";
    
    clearInterval(timerInterval);
    timerInterval = setInterval(() => {
        timeLeft--;
        document.getElementById("timer-ui").innerText = `残り: ${timeLeft}s`;
        if (timeLeft <= 0) endOriginalGame();
    }, 1000);

    clearInterval(gameInterval);
    gameInterval = setInterval(gameLoop, 1000 / 60);
}

function gameLoop() {
    if (gameState !== "PLAY") return;

    player.update();

    if (player.y - cameraY < V_HEIGHT * 0.4) {
        cameraY = player.y - V_HEIGHT * 0.4;
    } else if (player.y - cameraY > V_HEIGHT * 0.6) {
        cameraY = player.y - V_HEIGHT * 0.6;
    }

    if (cameraY > 0) cameraY = 0;

    let currentScore = Math.floor((V_HEIGHT - 150 - player.y) / 10);
    if (currentScore > score) {
        score = currentScore;
        document.getElementById("score-ui").innerText = `高度: ${score}m`;
    }

    let highestPlatformY = V_HEIGHT;
    platforms.forEach(p => {
        if (p.y < highestPlatformY) highestPlatformY = p.y;
    });

    if (highestPlatformY > player.y - V_HEIGHT) {
        platforms = platforms.concat(generatePlatforms(highestPlatformY - 60, 10));
    }

    const activePlatforms = platforms.filter(p => p.isGround || Math.abs(p.y - player.y) < V_HEIGHT * 1.5);

    if (player.vy >= 0) {
        let hitPlatform = false;
        activePlatforms.forEach(p => {
            if (player.x > p.x && player.x < p.x + p.w &&
                player.y + player.radius >= p.y && player.y - player.radius < p.y + p.h) {
                player.y = p.y - player.radius;
                player.vy = 0;
                player.vx = 0;
                player.isGrounded = true;
                hitPlatform = true;
            }
        });
        if (!hitPlatform && player.vy > 0.5) {
            player.isGrounded = false;
        }
    }

    if (player.y - cameraY > V_HEIGHT + 100) {
        player.y = cameraY + V_HEIGHT - 150;
        player.vy = 0;
        player.vx = 0;
        player.isGrounded = true;
    }

    ctx.clearRect(0, 0, V_WIDTH, V_HEIGHT);
    ctx.fillStyle = "#ffcc00";
    activePlatforms.forEach(p => {
        ctx.fillRect(p.x, p.y - cameraY, p.w, p.h);
    });

    player.draw();
}

const handleTap = (e) => {
    if (e.target.tagName === "INPUT" || e.target.tagName === "BUTTON") return;
    e.preventDefault();
    
    if (gameState === "PLAY" && player) {
        const rect = canvas.getBoundingClientRect();
        let clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const relativeX = ((clientX - rect.left) / rect.width) * V_WIDTH;
        const dx = relativeX - player.x;
        player.jump(dx);
    }
};
window.addEventListener("touchstart", handleTap, { passive: false });
window.addEventListener("mousedown", handleTap);

function endOriginalGame() {
    gameState = "END";
    clearInterval(gameInterval);
    clearInterval(timerInterval);
    
    document.getElementById("final-score").innerText = `記録: ${score}m`;
    document.getElementById("result-screen").classList.remove("hidden");
    
    sendScore();
}

function restartGame() {
    startGame();
}

// --- サーバー通信処理（完全に相対パスへ修正） ---
async function sendScore() {
    const userName = document.getElementById("username").value;
    const list = document.getElementById("ranking-list");
    list.innerHTML = "<li>データを送信中...</li>";

    try {
        // 1. スコアを送信
        await fetch("/api/score", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ name: userName, score: score })
        });

        // 2. 最新のランキングを即座に取得
        const response = await fetch("/api/ranking");
        if (!response.ok) throw new Error("ランキングの取得に失敗しました");
        const data = await response.json();
        
        list.innerHTML = "";
        if (data.length === 0) {
            list.innerHTML = "<li>まだスコアがありません。</li>";
        } else {
            data.forEach((item, index) => {
                const li = document.createElement("li");
                li.innerHTML = `<span>${index + 1}. ${item.name}</span><span>${item.score}m</span>`;
                list.appendChild(li);
            });
        }
    } catch (e) {
        console.error("エラー:", e);
        list.innerHTML = "<li>スコアサーバーに接続できませんでした。</li>";
    }
}
</script>
</body>
</html>
