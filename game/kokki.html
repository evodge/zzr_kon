        body {
            margin: 0; padding: 10px; background: #1c1c1e;

            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .game-container {
            width: 100%; max-width: 420px;

            box-shadow: 0 4px 20px rgba(0,0,0,0.6);
            box-sizing: border-box;
        }
        h1 { font-size: 18px; margin: 0 0 5px 0; color: #00ffcc; }
        .score-board { font-size: 14px; color: #ffd60a; margin-bottom: 15px; font-weight: bold; }
        
        /* 国旗表示エリア */
        .flag-stage {
            width: 240px; height: 160px; margin: 0 auto 20px auto;
            background: #3a3a3c; border: 4px solid #555;
            box-shadow: 0 6px 12px rgba(0,0,0,0.5);
            position: relative; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        /* 国旗の文字配信用スタイル */
        .flag-emoji { font-size: 100px; line-height: 160px; text-align: center; user-select: none; }
        .text-quiz-box { font-size: 15px; color: #ffd60a; font-weight: bold; padding: 10px; text-align: center; line-height: 1.6; }

        /* 固定5問用のCSSスタイル（以前のものを完全維持） */
        .flag-bangladesh { background: #006a4e; position: relative; width: 100%; height: 100%; }
        .flag-bangladesh::after { content: ''; position: absolute; top: 50%; left: 45%; width: 96px; height: 96px; background: #f42a41; border-radius: 50%; transform: translate(-50%, -50%); }
        .flag-vietnam { background: #da251d; position: relative; width: 100%; height: 100%; }
        .flag-vietnam::after { content: '★'; position: absolute; top: 52%; left: 50%; transform: translate(-50%, -50%); color: #ffff00; font-size: 90px; line-height: 1; }
        .flag-mexico { display: flex; width: 100%; height: 100%; position: relative; }
        .flag-mexico .g { flex: 1; background: #006847; }
        .flag-mexico .w { flex: 1; background: #ffffff; }
        .flag-mexico .r { flex: 1; background: #ce1126; }
        .flag-mexico::after { content: '🦅'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 32px; }
        .flag-iceland { background: #002395; width: 100%; height: 100%; position: relative; }
        .flag-iceland::before { content: ''; position: absolute; background: #ffffff; top: 60px; left: 0; width: 100%; height: 40px; }
        .flag-iceland::after { content: ''; position: absolute; background: #ffffff; top: 0; left: 60px; width: 40px; height: 100%; }
        .iceland-red-v { position: absolute; background: #dc143c; top: 0; left: 70px; width: 20px; height: 100%; z-index: 2; }
        .iceland-red-h { position: absolute; background: #dc143c; top: 70px; left: 0; width: 100%; height: 20px; z-index: 2; }

        .msg-box { font-size: 15px; font-weight: bold; min-height: 50px; margin-bottom: 15px; color: #fff; display: flex; justify-content: center; align-items: center; padding: 0 10px; }

        /* 3択レイアウト */
        .choice-list { display: flex; flex-direction: column; gap: 10px; width: 100%; }
        .choice-btn {
            padding: 14px 10px; font-size: 15px; font-weight: bold; border: none;
            border-radius: 10px; cursor: pointer; background: #3a3a3c; color: white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3); transition: background 0.2s, transform 0.1s;
        }
        .choice-btn:active { transform: scale(0.98); }

        .btn-action { background: #bf5af2; color: white; padding: 12px; font-size: 15px; border-radius: 8px; width: 100%; margin-top: 15px; border: none; font-weight: bold; cursor: pointer;}
        .back-menu { background: #48484a; color: white; margin-top: 15px; display: inline-block; text-decoration: none; padding: 8px 15px; border-radius: 6px; font-size: 13px;}
    </style>
</head>

    let currentStageQuestions = []; 
    let currentQuestionIndex = 0;
    let score = 0;
    let hasAnswered = false;
    let shuffledChoices = [];
    
    const FIXED_COUNT = 5;       // 前半の固定問数
    const RANDOM_COUNT = 5;      // 後半のランダム問数
    const TOTAL_QUESTIONS = 10;   // 合計10問

    function initQuiz() {
        currentQuestionIndex = 0;
        score = 0;
        
        // 1. まず固定の5問を用意
        currentStageQuestions = [...fixedQuestions];
        
        // 2. 150問のプールからランダムに重複なしで5問選んでドッキング
        const shuffledPool = [...randomCountryPool].sort(() => Math.random() - 0.5);
        const selectedRandoms = shuffledPool.slice(0, RANDOM_COUNT);
        
        // 3. ランダムプールから選んだデータを、バリエーション豊かな問題形式に自動変換して追加
        selectedRandoms.forEach((item, index) => {
            const numStr = FIXED_COUNT + index + 1;
            const flagMarkup = `<div class="flag-emoji">${item.flagOverride ? item.flagOverride : item.flag}</div>`;
            
            if (item.type === "feint") {
                // 引っかけ形式：この国旗に似ているもので「間違っている」国は？
                currentStageQuestions.push({
                    html: flagMarkup,
                    questionText: `【問題${numStr}：間違い探し】<br>画面の国旗は「${item.name}」です。これとデザインがそっくりな仲間として【間違っている国】はどこ？`,
                    answer: item.fake,
                    choices: [item.fake, item.d1, item.d2]
                });
            } else if (item.type === "color") {
                // 色違い形式：この国旗の色違い・デザイン違いの国は？
                currentStageQuestions.push({
                    html: flagMarkup,
                    questionText: `【問題${numStr}：色違い探し】<br>画面の国旗は「${item.name}」です。これと「配置や構成」が色違いでほぼ同じ国はどこ？`,
                    answer: item.match,
                    choices: [item.match, item.d1, item.d2]
                });
            } else {
                // 通常形式：この国旗はどこ？
                currentStageQuestions.push({
                    html: flagMarkup,
                    questionText: `【問題${numStr}】<br>この国旗の国名はどこでしょう？`,
                    answer: item.name,
                    choices: [item.name, item.d1, item.d2]
                });
            }
        });
        
        showQuestion();
    }

    function showQuestion() {
        hasAnswered = false;
        document.getElementById('next-btn').style.display = "none";
        document.getElementById('score-text').innerText = `第 ${currentQuestionIndex + 1} 問 / スコア: ${score}`;

        const currentQuiz = currentStageQuestions[currentQuestionIndex];
        
        document.getElementById('flag-container').innerHTML = currentQuiz.html;
        document.getElementById('msg-text').innerHTML = currentQuiz.questionText;
        document.getElementById('msg-text').style.color = "white";

        // 3つの選択肢をシャッフル
        shuffledChoices = [...currentQuiz.choices].sort(() => Math.random() - 0.5);

        for (let i = 0; i < 3; i++) {
            const btn = document.getElementById(`choice-${i}`);
            btn.innerText = shuffledChoices[i];
            btn.style.background = "#3a3a3c";
            btn.style.color = "white";
            btn.style.display = "block";
        }
    }

    function selectAnswer(selectedIndex) {
        if (hasAnswered) return;
        hasAnswered = true;

        const currentQuiz = currentStageQuestions[currentQuestionIndex];
        const selectedName = shuffledChoices[selectedIndex];
        const msgText = document.getElementById('msg-text');

        for (let i = 0; i < 3; i++) {
            const btn = document.getElementById(`choice-${i}`);
            if (shuffledChoices[i] === currentQuiz.answer) {
                btn.style.background = "#30d158"; // 正解：緑
                btn.style.color = "#fff";
            } else if (i === selectedIndex) {
                btn.style.background = "#ff453a"; // 不正解：赤
                btn.style.color = "#fff";
            }
        }

        if (selectedName === currentQuiz.answer) {
            score++;
            msgText.innerHTML = "<span style='color:#30d158; font-size: 16px;'>⭕ 正解！素晴らしい知識です！</span>";
        } else {
            msgText.innerHTML = `<span style='color:#ff453a; font-size: 16px;'>❌ 残念！正解は「${currentQuiz.answer}」でした。</span>`;
        }

        document.getElementById('score-text').innerText = `第 ${currentQuestionIndex + 1} 問 / スコア: ${score}`;
        
        const nextBtn = document.getElementById('next-btn');
        nextBtn.innerText = (currentQuestionIndex === TOTAL_QUESTIONS - 1) ? "最終リザルトを見る" : "次の問題へ";
        nextBtn.style.display = "block";
    }

    function nextQuestion() {
        currentQuestionIndex++;
        
        if (currentQuestionIndex < TOTAL_QUESTIONS) {
            showQuestion();
        } else {
            // 10問全終了
            document.getElementById('flag-container').innerHTML = "<div style='font-size:45px; padding-top:10px;'>🏆</div>";
            
            let evaluation = "国旗初級レベル！これから覚えていこう！";
            if(score === 10) evaluation = "完璧！全問正解！君は天才国旗マスターだ！👑";
            else if(score >= 8) evaluation = "超優秀！世界の地理博士レベル！大あっぱれ！🌟";
            else if(score >= 5) evaluation = "合格点！ひっかけに負けずよく頑張った！👍";

            document.getElementById('msg-text').innerHTML = `全10問終了！ スコア: <span style='color:#ffd60a; font-size:22px;'>${score} / ${TOTAL_QUESTIONS}</span><br><br><span style='font-size: 14px; color: #00ffcc;'>${evaluation}</span>`;
            document.getElementById('msg-text').style.color = "white";
            
            for (let i = 0; i < 3; i++) {
                document.getElementById(`choice-${i}`).style.display = "none";
            }
            
            const nextBtn = document.getElementById('next-btn');
            nextBtn.innerText = "もう一度（別の問題）で遊ぶ";
            nextBtn.style.background = "#bf5af2";
            currentQuestionIndex = -1; 
        }
    }

    document.getElementById('next-btn').onclick = function() {
        if (currentQuestionIndex === -1) {
            initQuiz();
        } else {
            nextQuestion();
        }
    };

    window.onload = initQuiz;
