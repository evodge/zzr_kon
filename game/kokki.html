<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>完全オリジナル！ひっかけ国旗クイズ</title>
    <style>
        body {
            margin: 0; padding: 10px; background: #1c1c1e;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            color: white; text-align: center;
            box-sizing: border-box; min-height: 100vh;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .game-container {
            width: 100%; max-width: 400px;
            background: #2c2c2e; padding: 25px; border-radius: 14px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.6);
            box-sizing: border-box;
        }
        h1 { font-size: 20px; margin: 0 0 5px 0; color: #00ffcc; }
        .score-board { font-size: 15px; color: #ffd60a; margin-bottom: 15px; font-weight: bold; }
        
        /* ==================== 国旗描画エリア（CSS） ==================== */
        .flag-stage {
            width: 240px; height: 160px; margin: 0 auto 25px auto;
            background: #3a3a3c; border: 4px solid #555;
            box-shadow: 0 6px 12px rgba(0,0,0,0.5);
            position: relative; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        /* 1. バングラデシュ（緑地に赤丸） */
        .flag-bangladesh { background: #006a4e; position: relative; width: 100%; height: 100%; }
        .flag-bangladesh::after {
            content: ''; position: absolute; top: 50%; left: 45%;
            width: 96px; height: 96px; background: #f42a41;
            border-radius: 50%; transform: translate(-50%, -50%);
        }

        /* 2. ベトナム（赤地に中央に黄色の星） */
        .flag-vietnam { background: #da251d; position: relative; width: 100%; height: 100%; }
        .flag-vietnam::after {
            content: '★'; position: absolute; top: 52%; left: 50%;
            transform: translate(-50%, -50%);
            color: #ffff00; font-size: 90px; line-height: 1;
        }

        /* 3. メキシコ（縦三色＋中央に鷲のマーク風絵文字） */
        .flag-mexico { display: flex; width: 100%; height: 100%; position: relative; }
        .flag-mexico .g { flex: 1; background: #006847; }
        .flag-mexico .w { flex: 1; background: #ffffff; }
        .flag-mexico .r { flex: 1; background: #ce1126; }
        .flag-mexico::after {
            content: '🦅'; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); font-size: 32px;
        }

        /* ★5. アイスランド（青地に白枠＋赤の十字） */
        .flag-iceland { background: #002395; width: 100%; height: 100%; position: relative; }
        .flag-iceland::before { /* 白い十字（太め） */
            content: ''; position: absolute; background: #ffffff; top: 60px; left: 0; width: 100%; height: 40px;
        }
        .flag-iceland::after { /* 縦の白い十字 */
            content: ''; position: absolute; background: #ffffff; top: 0; left: 60px; width: 40px; height: 100%;
        }
        /* 赤い十字のレイヤー */
        .iceland-red-v { position: absolute; background: #dc143c; top: 0; left: 70px; width: 20px; height: 100%; z-index: 2; }
        .iceland-red-h { position: absolute; background: #dc143c; top: 70px; left: 0; width: 100%; height: 20px; z-index: 2; }

        /* テキスト問題用のスタイル */
        .text-quiz-box { font-size: 14px; color: #ffd60a; font-weight: bold; padding: 15px; text-align: center; line-height: 1.6; }
        /* ======================================================================== */

        .msg-box { font-size: 16px; font-weight: bold; min-height: 24px; margin-bottom: 15px; color: #fff; }

        /* 3択レイアウト */
        .choice-list { display: flex; flex-direction: column; gap: 10px; width: 100%; }
        .choice-btn {
            padding: 14px 10px; font-size: 16px; font-weight: bold; border: none;
            border-radius: 10px; cursor: pointer; background: #3a3a3c; color: white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3); transition: background 0.2s, transform 0.1s;
        }
        .choice-btn:active { transform: scale(0.98); }
        .choice-btn:hover { background: #48484a; }

        .btn-action { background: #bf5af2; color: white; padding: 12px; font-size: 15px; border-radius: 8px; width: 100%; margin-top: 15px; border: none; font-weight: bold; cursor: pointer;}
        .back-menu { background: #48484a; color: white; margin-top: 15px; display: inline-block; text-decoration: none; padding: 8px 15px; border-radius: 6px; font-size: 13px;}
    </style>
</head>
<body>

<div class="game-container">
    <h1>🌍 自作ひっかけ国旗クイズ（5問）</h1>
    <div class="score-board" id="score-text">第 1 問 / スコア: 0</div>
    
    <!-- 国旗表示エリア -->
    <div class="flag-stage" id="flag-container"></div>

    <div class="msg-box" id="msg-text">問題をよく読んで答えよう！</div>

    <!-- 3択ボタン -->
    <div class="choice-list">
        <button class="choice-btn" id="choice-0" onclick="selectAnswer(0)">選択肢1</button>
        <button class="choice-btn" id="choice-1" onclick="selectAnswer(1)">選択肢2</button>
        <button class="choice-btn" id="choice-2" onclick="selectAnswer(2)">選択肢3</button>
    </div>
    
    <button class="btn-action" id="next-btn" onclick="nextQuestion()" style="display: none;">次の問題へ</button>
</div>

<a href="index.html" class="back-menu">◀ ゲームの部屋に戻る</a>

<script>
    const myQuizQuestions = [
        { 
            html: '<div class="flag-bangladesh"></div>', 
            questionText: "【問題1】<br>日本のまわりの色を変えると、どこの国旗になる？",
            answer: "バングラデシュ", 
            choices: ["バングラデシュ", "ベトナム", "パラオ"] 
        },
        { 
            html: '<div class="flag-vietnam"></div>', 
            questionText: "【問題2】<br>中国に、とてもよく似ている国旗はどれ？",
            answer: "ベトナム", 
            choices: ["ベトナム", "ソマリア", "モロッコ"] 
        },
        { 
            html: '<div class="flag-mexico"></div>', 
            questionText: "【問題3】<br>イタリアと、メキシコの国旗は、何が違う？",
            answer: "マーク", 
            choices: ["マーク", "色", "どちらも"] 
        },
        { 
            html: '<div class="text-quiz-box">赤と白だけで作られている国旗は、世界に15個以上ある。うそ？本当？</div>', 
            questionText: "【問題4】<br>国旗の雑学トリビア問題！",
            answer: "本当", 
            choices: ["本当", "うそ", "そんな国はない"] 
        },
        { 
            /* ★アイスランド国旗のグラフィックに修正 */
            html: '<div class="flag-iceland"><div class="iceland-red-v"></div><div class="iceland-red-h"></div></div>', 
            questionText: "【問題5】<br>アイスランドと、ノルウェーの国旗は、何が違う？",
            answer: "いろ", 
            choices: ["いろ", "形", "ない"] 
        }
    ];

    let currentStageQuestions = []; 
    let currentQuestionIndex = 0;
    let score = 0;
    let hasAnswered = false;
    let shuffledChoices = [];
    const TOTAL_QUESTIONS = 5; 

    function initQuiz() {
        currentQuestionIndex = 0;
        score = 0;
        
        myQuizQuestions.sort(() => Math.random() - 0.5);
        currentStageQuestions = [...myQuizQuestions];
        
        showQuestion();
    }

    function showQuestion() {
        hasAnswered = false;
        document.getElementById('next-btn').style.display = "none";
        document.getElementById('score-text').innerText = `第 ${currentQuestionIndex + 1} 問 / スコア: ${score}`;

        const currentQuiz = currentStageQuestions[currentQuestionIndex];
        
        document.getElementById('flag-container').innerHTML = currentQuiz.html;
        document.getElementById('msg-text').innerHTML = currentQuiz.questionText;
        document.getElementById('msg-text').style.color = "white";

        shuffledChoices = [...currentQuiz.choices].sort(() => Math.random() - 0.5);

        for (let i = 0; i < 3; i++) {
            const btn = document.getElementById(`choice-${i}`);
            btn.innerText = shuffledChoices[i];
            btn.style.background = "#3a3a3c";
            btn.style.color = "white";
            btn.style.display = "block";
        }
    }

    function selectAnswer(selectedIndex) {
        if (hasAnswered) return;
        hasAnswered = true;

        const currentQuiz = currentStageQuestions[currentQuestionIndex];
        const selectedName = shuffledChoices[selectedIndex];
        const msgText = document.getElementById('msg-text');

        for (let i = 0; i < 3; i++) {
            const btn = document.getElementById(`choice-${i}`);
            if (shuffledChoices[i] === currentQuiz.answer) {
                btn.style.background = "#30d158"; 
                btn.style.color = "#fff";
            } else if (i === selectedIndex) {
                btn.style.background = "#ff453a"; 
                btn.style.color = "#fff";
            }
        }

        if (selectedName === currentQuiz.answer) {
            score++;
            msgText.innerHTML = "<span style='color:#30d158;'>⭕ 正解！お見事！</span>";
        } else {
            msgText.innerHTML = `<span style='color:#ff453a;'>❌ 残念！正解は「${currentQuiz.answer}」でした。</span>`;
        }

        document.getElementById('score-text').innerText = `第 ${currentQuestionIndex + 1} 問 / スコア: ${score}`;
        
        const nextBtn = document.getElementById('next-btn');
        nextBtn.innerText = (currentQuestionIndex === TOTAL_QUESTIONS - 1) ? "最終結果を見る" : "次の問題へ";
        nextBtn.style.display = "block";
    }

    function nextQuestion() {
        currentQuestionIndex++;
        
        if (currentQuestionIndex < TOTAL_QUESTIONS) {
            showQuestion();
        } else {
            document.getElementById('flag-container').innerHTML = "<div style='font-size:40px;'>👑</div>";
            document.getElementById('msg-text').innerHTML = `全問終了！ あなたのスコアは<br><span style='color:#ffd60a; font-size:24px;'>${score} / ${TOTAL_QUESTIONS}</span> です！`;
            document.getElementById('msg-text').style.color = "white";
            
            for (let i = 0; i < 3; i++) {
                document.getElementById(`choice-${i}`).style.display = "none";
            }
            
            const nextBtn = document.getElementById('next-btn');
            nextBtn.innerText = "もう一度遊ぶ";
            nextBtn.style.background = "#bf5af2";
            currentQuestionIndex = -1; 
        }
    }

    document.getElementById('next-btn').onclick = function() {
        if (currentQuestionIndex === -1) {
            initQuiz();
        } else {
            nextQuestion();
        }
    };

    window.onload = initQuiz;
</script>

</body>
</html>
